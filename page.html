<!-- index es la palabra reservada para indicar la página principal 
    del proyecto, los buscadores o lo que sea siempre buscan primero 
    esta página-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!--estándar para la codificacion (letras) que podemos usar-->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--viewport sirve para ajustar mi pag a cel, tablets etc-->
    <title>Página principal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section>
    <!--section es el elemento padre-->
        <div>
        <!-- div es el elemento hijo-->
            <div>
                <h1 class="titulo">Tienda Virtual</h1>
                <h2>Hola Mundo</h2>
                <!--Solo hay un h1 y h2 (solo hay un título y subtítulo)-->
            </div>
        </div>
    </section>
    <section>
        <table>
            <tr>
                <td>Woah</td>
            </tr>
        </table>
    </section>
    <section>
        <div class="descripcion-tienda">
        <!--Siempre es importante tener buenas etiquetas
        para lo que queramos hacer posteriormente y no complicarnos-->
            <p>Una tienda donde podrás encontrar tu música</p>
            <img src="media/gato1.jpg" alt="una imagen muy bonita">
            <img src="media/gato2.jpg" alt="otra imagen bonita">
            <!--alt describe la imagen en caso de que no se pueda visualizar-->
            <p>Genero</p>
            <ul><!--unorder list-->
                <li>Rock</li>
                <li>Pop</li>
                <li>Metal</li>
                <li>Trance</li>
            </ul>
        </div>
        <div class="footer">
            <p>Derecos de Autor</p>
            <p>Contáctanos</p>
            <p>Términos y condiciones</p>
        </div>
    </section>
    <script type="text/javascript" src="js/script.js"></script>
    <!--Esta es la buena práctica. Incluir el js al final-->
</body>
</html>
